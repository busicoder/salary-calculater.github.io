<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;margin:10px;}
#monthControl{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:5px;}
#monthLabel{font-weight:bold;cursor:pointer;}
#calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.weekday{text-align:center;font-weight:bold;font-size:13px;padding:4px 0;}
.day{border:1px solid #ccc;min-height:70px;padding:3px;font-size:11px;border-radius:8px;}
.date{font-weight:bold;}
.today{border:3px solid black;}
.dcColor{background:#cfe5ff}
.indColor{background:#fff4b3}
.bothColor{background:#d8ffd8}
button,input,select{font-size:16px;padding:6px;}
.modalOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);display:none;z-index:999;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:72%;max-width:320px;background:white;border:1px solid black;border-radius:10px;padding:12px;z-index:1000;}
.switchBox{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.switch{position:relative;display:inline-block;width:50px;height:26px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:34px;}
.slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
input:checked + .slider{background:#4CAF50;}
input:checked + .slider:before{transform:translateX(24px);}
.modalButtons{display:flex;justify-content:center;gap:10px;margin-top:10px;}
#total{margin-top:15px;font-size:15px;line-height:1.6;}
</style>
</head>
<body>

<div id="monthControl">
<button onclick="prevMonth()">◀</button>
<div id="monthLabel"></div>
<button onclick="nextMonth()">▶</button>
<button onclick="backup()">백업</button>
<button onclick="document.getElementById('restoreFile').click()">복구</button>
<input type="file" id="restoreFile" style="display:none" onchange="restore(event)">
</div>

<div id="calendar"></div>
<div id="total"></div>

<div id="overlay" class="modalOverlay" onclick="closeModal()"></div>

<div id="modal" class="modal" style="display:none">
<h3 id="modalDate"></h3>
<div class="switchBox">
<span>DC</span>
<label class="switch">
<input type="checkbox" id="typeSwitch">
<span class="slider"></span>
</label>
<span>개별</span>
</div>
<input id="valueInput" placeholder="시간">
<div class="modalButtons">
<button onclick="addWork()">추가</button>
<button onclick="closeModal()">닫기</button>
</div>
<div id="workList"></div>
</div>

<script>
let workData=JSON.parse(localStorage.getItem("workData")||"{}")
let current=new Date()
let selectedDay=null
const DC_PAY=13000, IND_PAY=21000, ATTEND_PAY=3000

function save(){ localStorage.setItem("workData",JSON.stringify(workData)) }

function drawCalendar(){
let year=current.getFullYear(), month=current.getMonth()+1
document.getElementById("monthLabel").innerText=year+"년 "+month+"월"
let first=new Date(year,month-1,1).getDay()
let last=new Date(year,month,0).getDate()
let cal=document.getElementById("calendar")
cal.innerHTML=""
let days=["일","월","화","수","목","금","토"]
days.forEach(d=>{let head=document.createElement("div");head.className="weekday";head.innerText=d;cal.appendChild(head)})
for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"))
for(let d=1;d<=last;d++){
let cell=document.createElement("div")
cell.className="day"
cell.id="day-"+d
let today=new Date()
if(today.getFullYear()==year && today.getMonth()==month-1 && today.getDate()==d) cell.classList.add("today")
cell.innerHTML="<div class='date'>"+d+"</div>"
cell.onclick=()=>openModal(d)
cal.appendChild(cell)
}
updateCalendarUI()
calc()
}

function updateCalendarUI(){
let key=current.getFullYear()+"-"+(current.getMonth()+1)
for(let d=1;d<=31;d++){
let cell=document.getElementById("day-"+d)
if(!cell)continue
cell.classList.remove("dcColor","indColor","bothColor")
cell.innerHTML="<div class='date'>"+d+"</div>"
let list=(workData[key]||{})[d]
if(!list)continue
let dc=0, ind=0
list.forEach(w=>{if(w.type=="DC") dc+=Number(w.value); else ind+=Number(w.value)})
if(dc){ let div=document.createElement("div"); div.innerText="DC "+dc; cell.appendChild(div) }
if(ind){ let div=document.createElement("div"); div.innerText="개별 "+ind; cell.appendChild(div) }
if(dc&&ind) cell.classList.add("bothColor")
else if(dc) cell.classList.add("dcColor")
else if(ind) cell.classList.add("indColor")
}
}

function calc(){
let key=current.getFullYear()+"-"+(current.getMonth()+1)
let dcHours=0, indComma=0, workDays=0
let monthData=workData[key]||{}
Object.keys(monthData).forEach(d=>{
let day=monthData[d]
let hasInd=day.some(w=>w.type=="IND")
if(hasInd) workDays++
day.forEach(w=>{ if(w.type=="DC") dcHours+=Number(w.value); else indComma+=Number(w.value) })
})
let dcPay=dcHours*DC_PAY
let indPay=indComma*IND_PAY
// 출근비: 개별지도 근무일만 적용
let attendPay=workDays*ATTEND_PAY
let total=dcPay+indPay+attendPay
let net=Math.floor(total*0.967)

// 전체 누계
let totalComma=0, totalDc=0, totalAttend=0, totalMoney=0
Object.values(workData).forEach(month=>{
Object.values(month).forEach(day=>{
let hasInd=day.some(w=>w.type=="IND")
if(hasInd) totalAttend++
day.forEach(w=>{if(w.type=="DC"){ totalDc+=Number(w.value); totalMoney+=Number(w.value)*DC_PAY } else { totalComma+=Number(w.value); totalMoney+=Number(w.value)*IND_PAY }})
})
})
let totalAttendPay=totalAttend*ATTEND_PAY
let totalGross=totalMoney+totalAttendPay
let totalNet=Math.floor(totalGross*0.967)

document.getElementById("total").innerHTML=
"DC "+dcHours+"시간 / "+dcPay.toLocaleString()+"원<br>"+
"개별 "+indComma+"콤마 / "+indPay.toLocaleString()+"원<br>"+
"보고비용 "+workDays+"일 / "+attendPay.toLocaleString()+"원<br>"+
"<hr>"+
"총 원금 "+total.toLocaleString()+"원<br>"+
"원천징수 후 "+net.toLocaleString()+"원"+
"<hr>"+
"총 누계 DC "+totalDc+"시간<br>"+
"총 누계 콤마 "+totalComma+"콤마<br>"+
"총 누계 근무일(개별지도 기준) "+totalAttend+"일<br>"+
"총 누계 수입(세후) "+totalNet.toLocaleString()+"원"
}

function prevMonth(){ current.setMonth(current.getMonth()-1); drawCalendar() }
function nextMonth(){ current.setMonth(current.getMonth()+1); drawCalendar() }

function openModal(d){selectedDay=d; document.getElementById("overlay").style.display="block"; document.getElementById("modal").style.display="block"; document.getElementById("modalDate").innerText=current.getFullYear()+"-"+(current.getMonth()+1)+"-"+d; updateWorkList()}
function closeModal(){ document.getElementById("modal").style.display="none"; document.getElementById("overlay").style.display="none" }

function addWork(){
let type=document.getElementById("typeSwitch").checked?"IND":"DC"
let value=document.getElementById("valueInput").value
if(!value) return
let key=current.getFullYear()+"-"+(current.getMonth()+1)
if(!workData[key]) workData[key]={}
if(!workData[key][selectedDay]) workData[key][selectedDay]=[]
workData[key][selectedDay].push({type,value})
save()
document.getElementById("valueInput").value=""
updateWorkList()
updateCalendarUI()
calc()
}

function updateWorkList(){
let key=current.getFullYear()+"-"+(current.getMonth()+1)
let list=(workData[key]||{})[selectedDay]||[]
let div=document.getElementById("workList")
div.innerHTML=""
list.forEach((w,i)=>{
let label=w.type=="DC"?"DC":"개별"
let item=document.createElement("div")
item.innerHTML=label+" "+w.value+" <button onclick='deleteWork("+i+")'>삭제</button>"
div.appendChild(item)
})
}

function deleteWork(i){
let key=current.getFullYear()+"-"+(current.getMonth()+1)
workData[key][selectedDay].splice(i,1)
save()
updateWorkList()
updateCalendarUI()
calc()
}

function backup(){ let blob=new Blob([JSON.stringify(workData)],{type:"application/json"}); let url=URL.createObjectURL(blob); let a=document.createElement("a"); a.href=url; a.download="work_backup.json"; a.click() }
function restore(e){ let file=e.target.files[0]; if(!file)return; let reader=new FileReader(); reader.onload=function(){ workData=JSON.parse(reader.result); save(); drawCalendar() }; reader.readAsText(file) }

drawCalendar()
</script>
</body>
</html>
